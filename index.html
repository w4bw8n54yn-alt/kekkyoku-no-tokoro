<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>結局のところ</title>
  <style>
    :root {
      --bg: #111111;
      --card: #1b1b1b;
      --card2: #262626;
      --text: #f4f4f4;
      --muted: #a8a8a8;
      --line: #363636;
      --accent: #f2f2f2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.08), transparent 32%),
        linear-gradient(180deg, #181818 0%, #0e0e0e 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 22px 14px;
    }

    .app {
      width: min(100%, 460px);
      min-height: calc(100vh - 44px);
      border-radius: 30px;
      background: rgba(27,27,27,.92);
      box-shadow: 0 24px 80px rgba(0,0,0,.42);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.06);
    }

    header {
      padding: 28px 24px 18px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 31px;
      letter-spacing: .02em;
      line-height: 1.2;
    }

    .lead {
      margin: 14px 0 0;
      color: #c8c8c8;
      line-height: 1.75;
      font-size: 15px;
    }

    main { padding: 22px; }

    .section-title {
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 12px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      padding: 13px 12px;
      background: #303030;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: .16s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: scale(.98);
      background: #444;
    }

    .free {
      margin-top: 18px;
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      background: #141414;
      color: var(--text);
      padding: 13px 15px;
      font-size: 14px;
      outline: none;
    }

    input::placeholder { color: #777; }

    .small-btn {
      flex: 0 0 auto;
      padding-inline: 18px;
      background: #eeeeee;
      color: #111;
      font-weight: 700;
    }

    .result {
      display: none;
      margin-top: 24px;
      padding: 22px;
      border-radius: 24px;
      background: var(--card2);
      border: 1px solid rgba(255,255,255,.07);
      animation: show .24s ease-out;
    }

    @keyframes show {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .scene {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .song {
      font-size: 27px;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .artist {
      color: #cccccc;
      font-size: 16px;
      margin-bottom: 18px;
    }

    .reason {
      color: #e0e0e0;
      line-height: 1.85;
      font-size: 15px;
      white-space: pre-line;
    }

    .links {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #111;
      background: #f3f3f3;
      border-radius: 999px;
      padding: 11px 15px;
      font-size: 14px;
      font-weight: 700;
    }

    a.secondary {
      background: transparent;
      color: #f3f3f3;
      border: 1px solid rgba(255,255,255,.22);
    }

    .again {
      width: 100%;
      margin-top: 16px;
      background: transparent;
      border: 1px solid rgba(255,255,255,.18);
    }

    .note {
      margin: 18px 2px 0;
      color: #828282;
      font-size: 12px;
      line-height: 1.7;
    }

    footer {
      padding: 0 22px 24px;
      color: #777;
      font-size: 12px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="eyebrow">ONE SONG FOR YOUR WAY HOME</div>
      <h1>結局のところ</h1>
      <p class="lead">
        今いる物語に、一曲だけ。<br>
        気分じゃなくて、帰り道の感じで選びます。
      </p>
    </header>

    <main>
      <p class="section-title">今どんな帰り道？</p>

      <div class="buttons">
        <button onclick="recommend('gohome')">家に帰りたくない</button>
        <button onclick="recommend('station')">電車降りた</button>
        <button onclick="recommend('detour')">遠回りしたい</button>
        <button onclick="recommend('wordless')">言葉にできん</button>
        <button onclick="recommend('night')">夜道がちょうどいい</button>
        <button onclick="recommend('notend')">まだ終わりたくない</button>
        <button onclick="recommend('light')">今日は悪くない</button>
        <button onclick="recommend('empty')">なんか虚無</button>
      </div>

      <div class="free">
        <input id="freeText" type="text" placeholder="一言で今の感じを書く" />
        <button class="small-btn" onclick="recommendFromText()">選ぶ</button>
      </div>

      <div class="result" id="result">
        <div class="scene" id="scene"></div>
        <div class="song" id="song"></div>
        <div class="artist" id="artist"></div>
        <div class="reason" id="reason"></div>
        <div class="links">
          <a id="youtube" href="#" target="_blank" rel="noopener">YouTubeで聴く</a>
          <a id="apple" class="secondary" href="#" target="_blank" rel="noopener">Apple Musicで探す</a>
        </div>
        <button class="again" onclick="recommend(lastMood)">もう一曲だけ</button>
      </div>

      <p class="note">
        ※これはプロトタイプです。曲はスクショの「結局のところ」から組み込んでいます。
      </p>
    </main>

    <footer>
      曲そのものより、その曲を聴きたくなる瞬間を集めるための小さな入口。
    </footer>
  </div>

  <script>
    let lastMood = "night";

    const songs = {
      gohome: [
        {
          scene: "家までの道が、少しだけ長く感じる帰り道。",
          song: "誰にも見つけられない星になれたら",
          artist: "andymori",
          reason: "誰かに見つけてほしいような、見つけられたくないような夜に。\nまっすぐ帰るだけの日にも、少しだけ物語が残る。",
        },
        {
          scene: "帰れる場所はあるのに、まだそこへ向かいきれない時間。",
          song: "ラブホテル",
          artist: "クリープハイプ",
          reason: "きれいごとでは片付かない気分を、そのまま持って帰れる曲。",
        }
      ],
      station: [
        {
          scene: "電車を降りて、街の空気に戻る瞬間。",
          song: "君の街まで",
          artist: "ASIAN KUNG-FU GENERATION",
          reason: "歩き出す前の、少しだけ前向きな感じにちょうどいい。",
        },
        {
          scene: "改札を抜けて、いつもの街が少しだけ違って見える時。",
          song: "君の街まで",
          artist: "JABBA DA FOOTBALL CLUB",
          reason: "同じタイトルでも、こっちはもう少し生活に近い温度で鳴る。",
        }
      ],
      detour: [
        {
          scene: "まっすぐ帰らず、少しだけ遠回りする時間。",
          song: "ワンダーフォーゲル",
          artist: "くるり",
          reason: "どこかへ行きたいわけじゃないけど、今いる場所から少し動きたい日に。",
        },
        {
          scene: "目的地はないけど、足だけは止まっていない夜。",
          song: "Blue Moon",
          artist: "Supra",
          reason: "遠回りの余白に置くと、知らん街まで続いていきそうな曲。",
        }
      ],
      wordless: [
        {
          scene: "言葉にするほどでもない気持ちが残っている夜。",
          song: "言葉がなかったら",
          artist: "MONO NO AWARE",
          reason: "説明できない感覚を、説明しないまま置いておける曲。",
        },
        {
          scene: "何か言いたいのに、別に誰にも送る文章がない時。",
          song: "時間泥棒がやってくる",
          artist: "MONO NO AWARE",
          reason: "気づいたら過ぎている時間の中に、少しだけ意味を作ってくれる。",
        }
      ],
      night: [
        {
          scene: "コンビニの光だけが妙にきれいに見える夜道。",
          song: "シンセミア",
          artist: "Helsinki Lambda Club",
          reason: "夜の湿度と、少し浮いた気分に合う。",
        },
        {
          scene: "知らない道じゃないのに、少しだけ別の街みたいに見える夜。",
          song: "Be My Words",
          artist: "Helsinki Lambda Club",
          reason: "軽さと寂しさが同じ速度で歩いてくれる。",
        }
      ],
      notend: [
        {
          scene: "今日がまだ終わってほしくない帰り道。",
          song: "STAYGOLD, LIFE GOES ON",
          artist: "JABBA DA FOOTBALL CLUB",
          reason: "明るすぎず暗すぎず、生活が続いていく感じがある。",
        },
        {
          scene: "帰ったら終わるから、もう少しだけ外にいたい時。",
          song: "Revenge For Summer Part.2",
          artist: "JABBA DA FOOTBALL CLUB",
          reason: "季節の終わりみたいな名残惜しさを、軽く持たせてくれる。",
        }
      ],
      light: [
        {
          scene: "理由はないけど、今日は少しだけ悪くなかった。",
          song: "きみは最高",
          artist: "JABBA DA FOOTBALL CLUB",
          reason: "大げさな幸せじゃなくて、帰り道に少し口角が上がるくらいでいい日に。",
        },
        {
          scene: "風がちょうどよくて、生活が少しマシに見える時。",
          song: "Life Easy",
          artist: "Suchmos",
          reason: "力を抜いて歩くための曲。今日はこれくらいでいい。",
        }
      ],
      empty: [
        {
          scene: "嫌なことがあったわけじゃないのに、なんか空っぽな帰り道。",
          song: "1984",
          artist: "andymori",
          reason: "虚無を埋めるというより、虚無のまま歩かせてくれる曲。",
        },
        {
          scene: "頭の中だけうるさくて、街の音が遠くなる夜。",
          song: "スーパーマンになりたい",
          artist: "andymori",
          reason: "強くなりたい気持ちと、なれなさを同時に鳴らしてくれる。",
        }
      ]
    };

    function makeSearchUrl(platform, song, artist) {
      const q = encodeURIComponent(artist + " " + song);
      if (platform === "youtube") return "https://www.youtube.com/results?search_query=" + q;
      return "https://music.apple.com/jp/search?term=" + q;
    }

    function recommend(mood) {
      lastMood = mood || lastMood;
      const list = songs[lastMood] || songs.night;
      const item = list[Math.floor(Math.random() * list.length)];

      document.getElementById("scene").textContent = item.scene;
      document.getElementById("song").textContent = item.song;
      document.getElementById("artist").textContent = item.artist;
      document.getElementById("reason").textContent = item.reason;
      document.getElementById("youtube").href = makeSearchUrl("youtube", item.song, item.artist);
      document.getElementById("apple").href = makeSearchUrl("apple", item.song, item.artist);

      document.getElementById("result").style.display = "block";
      document.getElementById("result").scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function recommendFromText() {
      const text = document.getElementById("freeText").value.trim();

      if (!text) {
        recommend("night");
        return;
      }

      const rules = [
        { keys: ["帰りたく", "帰りたない", "家いや", "帰りたくない"], mood: "gohome" },
        { keys: ["電車", "駅", "改札", "降りた"], mood: "station" },
        { keys: ["遠回り", "歩きたい", "散歩", "歩く"], mood: "detour" },
        { keys: ["言葉", "説明", "わからん", "なんとも"], mood: "wordless" },
        { keys: ["夜", "コンビニ", "暗い", "夜道"], mood: "night" },
        { keys: ["終わりたく", "まだ", "帰ったら終わる"], mood: "notend" },
        { keys: ["悪くない", "よかった", "最高", "いい日"], mood: "light" },
        { keys: ["虚無", "空っぽ", "だるい", "疲れ", "何も"], mood: "empty" },
      ];

      const hit = rules.find(rule => rule.keys.some(key => text.includes(key)));
      recommend(hit ? hit.mood : "wordless");
    }

    recommend("night");
  </script>
</body>
</html>
